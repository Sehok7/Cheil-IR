name = "cheil-ir-dashboard"
main = "src/index.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = false

# 매일 한국시간 09:30 = UTC 00:30 (KST = UTC+9)
[triggers]
crons = ["30 0 * * *"]

# R2 버킷 바인딩 (cheil 전용 신규 버킷)
[[r2_buckets]]
binding = "REPORTS"
bucket_name = "cheil-ir-reports"

# Secrets (wrangler secret put 으로 등록):
# - ANTHROPIC_API_KEY
# - NAVER_CLIENT_ID
# - NAVER_CLIENT_SECRET

[vars]
COMPANY_NAME = "제일기획"
COMPANY_CODE = "030000"
CLAUDE_MODEL = "claude-opus-4-7"
# 시계열 백필 기준일 (Phase 2에서 활용)
HISTORY_START = "2025-12-01"
